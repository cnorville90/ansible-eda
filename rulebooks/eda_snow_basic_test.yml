---
- name: Basic Webhook Actions Test
  hosts: all
  sources:
    - name: Listen for events from ServiceNow
      ansible.eda.webhook:
        host: 0.0.0.0
        port: 5001


  rules:
    - name: Output ServiceNow Information
      condition: event.meta is defined
      action:
        debug: 

    - name: "EDA From Catalog Item: Norville - SNOW AAP EDA Cool Stuff"
      condition: event.payload.catalog_item == "Norville - SNOW AAP EDA Cool Stuff"
      action: 
        run_job_template:
          name: 'EDA - Basic Test'
          organization: 'Default'